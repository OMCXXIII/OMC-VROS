<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMC VR-OS | SENTINEL v4.1 KERNEL</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="CSS.CSS">
</head>
<body>
    <div class="crt-overlay"></div>
    
    <div id="hud-alerts">
        <div class="stat-line">STATUS: <span id="sys-status">SISTEMA COMPILADO</span></div>
        <div class="stat-line">LATÊNCIA: <span id="lat-val">0.0s</span></div>
        <div class="stat-line">PERFIL: <span id="profile-id">ALPHA</span></div>
    </div>

    <a-scene shadow="type: pcfsoft" renderer="antialias: true; colorManagement: true;">
        
        <a-sky color="#000205"></a-sky>
        <a-grid position="0 0 0" rotation="-90 0 0" width="100" height="100" 
                material="color: #00D4FF; opacity: 0.05; src: url(https://cdn.aframe.io/a-grid/images/grid.png); repeat: 50 50">
        </a-grid>

        <a-entity camera look-controls wasd-controls position="0 1.6 0">
            <a-cursor color="#00D4FF" fuse="false" scale="0.5 0.5 0.5"></a-cursor>
            
            <a-entity position="0.8 -0.5 -1" scale="0.2 0.2 0.2">
                <a-text value="BATERIA MENTAL (CPF)" color="#00D4FF" align="center"></a-text>
                <a-plane id="bar-cpf" width="2" height="0.1" position="0 -0.2 0" color="#00D4FF" opacity="0.8"></a-plane>
                <a-plane id="bar-mielina" width="2" height="0.1" position="0 -0.4 0" color="#FFB800" opacity="0.8"></a-plane>
            </a-entity>
        </a-entity>

        <a-entity position="0 1.6 -2">
            <a-ring color="#00D4FF" radius-inner="1.45" radius-outer="1.5" opacity="0.2">
                <a-animation attribute="rotation" to="0 0 360" dur="20000" repeat="indefinite" easing="linear"></a-animation>
            </a-ring>

            <a-plane id="main-display" width="2.5" height="1.5" material="color: #00151f; opacity: 0.6; transparent: true; shader: flat">
                <a-text id="vr-text-output" value="AGUARDANDO INPUT FÍSICO..." 
                        position="-1.1 0.6 0.01" width="2.2" color="#00D4FF" wrap-count="30" font="monospace">
                </a-text>
                
                <a-text id="mission-tag" value="MISSÃO: CONSOLIDAR_SBC" position="-1.1 -0.6 0.01" width="1.5" color="#FFB800"></a-text>
                <a-text id="clock-signal" value="CLOCK: 00:00:00" position="0.3 -0.6 0.01" width="1.5" color="#00D4FF"></a-text>
            </a-plane>
        </a-entity>

        <a-light type="ambient" color="#002b36" intensity="0.5"></a-light>
        <a-light type="point" intensity="1" distance="10" position="2 4 2" color="#00D4FF"></a-light>
    </a-scene>

    <script src="js.js" defer></script>
</body>
</html>
