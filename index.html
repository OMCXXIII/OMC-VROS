<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMC VR-OS | SENTINEL v4.5</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
    
    <link rel="stylesheet" href="css.css">
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="vignette"></div>

    <a-scene fog="type: exponential; color: #000; density: 0.1" renderer="antialias: true; colorManagement: true">
        
        <a-assets>
            <a-mixin id="glass" material="color: #00151f; opacity: 0.4; transparent: true; metalness: 0.6; roughness: 0.1"></a-mixin>
            <a-mixin id="glow-text" text="color: #00D4FF; align: center; font: monoid"></a-mixin>
        </a-assets>

        <a-sky color="#000"></a-sky>
        <a-grid position="0 0 0" rotation="-90 0 0" width="100" height="100" static-body material="color: #00D4FF; opacity: 0.03; wireframe: true"></a-grid>

        <a-entity id="reactor-core" position="0 1.5 -2.8">
            <a-sphere radius="0.05" color="#00D4FF" animation="property: scale; to: 1.5 1.5 1.5; dir: alternate; dur: 2000; loop: true"></a-sphere>
            <a-torus radius="0.3" radius-tubular="0.005" color="#00D4FF" opacity="0.5"
                     animation="property: rotation; to: 360 360 0; dur: 12000; loop: true; easing: linear"></a-torus>
            <a-ring radius-inner="0.35" radius-outer="0.36" color="#00D4FF" opacity="0.2"
                    animation="property: rotation; to: 0 -360 360; dur: 15000; loop: true; easing: linear"></a-ring>
        </a-entity>

        <a-plane id="mon-minus-2" class="ghost-window" mixin="glass" position="-4.5 1.8 -2" rotation="0 45 0" width="2.5" height="1.8"
                 event-set__mouseenter="material.opacity: 0.9" event-set__mouseleave="material.opacity: 0.4">
            <a-text value="[RAW_DATA_STREAM]" position="0 0.7 0.05" scale="0.6 0.6 0.6" mixin="glow-text"></a-text>
            <a-text value="GPU_TEMP: 64C\nUPLINK: ACTIVE\nSTARLINK_SYNC: 100%" position="0 0 0.05" scale="0.4 0.4 0.4" align="center"></a-text>
        </a-plane>

        <a-plane id="mon-minus-1" class="ghost-window" mixin="glass" position="-2.2 1.8 -3" rotation="0 20 0" width="2.2" height="1.8"
                 event-set__mouseenter="material.opacity: 0.9" event-set__mouseleave="material.opacity: 0.4">
            <a-text value="[DIAGNOSTICS]" position="0 0.7 0.05" scale="0.6 0.6 0.6" mixin="glow-text"></a-text>
            <a-text id="log-display" value="MIELINA: 150m/s\nLATENCY: 14ms\nSYSTEM: STABLE" position="0 0 0.05" scale="0.4 0.4 0.4" align="center"></a-text>
        </a-plane>

        <a-plane id="mon-0" position="0 1.8 -3.5" width="4.2" height="2.8" 
                 material="color: #000; opacity: 0.85; transparent: true; side: double; shader: flat"
                 style="border: 2px solid #00D4FF">
            <a-rect width="4.3" height="2.9" position="0 0 -0.01" material="color: #00D4FF; wireframe: true"></a-rect>
            
            <a-text id="execution-header" value="> MODO_AUTORIA_ATIVA" position="-1.9 1.2 0.1" scale="0.5 0.5 0.5" color="#00D4FF"></a-text>
            
            <a-text id="execution-text" value="Aguardando Input do Operador..." 
                    position="-1.9 0.8 0.1" width="3.8" wrap-count="40" color="#00D4FF" baseline="top"></a-text>
        </a-plane>

        <a-plane id="mon-plus-1" class="ghost-window" mixin="glass" position="2.2 1.8 -3" rotation="0 -20 0" width="2.2" height="1.8"
                 event-set__mouseenter="material.opacity: 0.9" event-set__mouseleave="material.opacity: 0.4">
            <a-text value="[NEXUS_DOMAINS]" position="0 0.7 0.05" scale="0.6 0.6 0.6" mixin="glow-text"></a-text>
            <a-text value="1. ALPHA (TECH)\n2. BETA (REAL ESTATE)\n3. GAMMA (AUTH)" position="0 0 0.05" scale="0.4 0.4 0.4" align="center"></a-text>
        </a-plane>

        <a-plane id="mon-plus-2" class="ghost-window" mixin="glass" position="4.5 1.8 -2" rotation="0 -45 0" width="2.5" height="1.8"
                 event-set__mouseenter="material.opacity: 0.9" event-set__mouseleave="material.opacity: 0.4">
            <a-text value="[ATC_CLOCK]" position="0 0.7 0.05" scale="0.6 0.6 0.6" mixin="glow-text"></a-text>
            <a-text id="atc-timer" value="00:00:00\nSESSAO: ATIVA" position="0 0 0.05" scale="0.7 0.7 0.7" align="center" color="#FFB800"></a-text>
        </a-plane>

        <a-entity id="hud-stats" position="0 0.6 -1.8" rotation="-30 0 0">
            <a-plane width="1.8" height="0.15" material="color: #000; opacity: 0.6; transparent: true"></a-plane>
            <a-text id="bio-feedback" value="CPF: 100% | MIELINA: OK | STATUS: SOVERANO" 
                    align="center" scale="0.35 0.35 0.35" position="0 0 0.05" color="#00D4FF"></a-text>
            <a-rect width="1.8" height="0.02" position="0 -0.08 0.05" material="color: #00D4FF"></a-rect>
        </a-entity>

        <a-entity camera id="main-camera" look-controls position="0 1.6 0">
            <a-cursor id="cursor" color="#00D4FF" fuse="true" fuse-timeout="1000"
                      animation__fusing="property: scale; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1000; startEvents: fusing"
                      animation__mouseleave="property: scale; to: 1 1 1; dur: 500; startEvents: mouseleave"
                      raycaster="objects: .ghost-window, #mon-0">
            </a-cursor>
        </a-entity>

    </a-scene>

    <script src="js.js" defer></script>
</body>
</html>
