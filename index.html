<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMC VR-OS | SENTINEL v4.1</title>
    
    <!-- Injeção do Engine 3D (A-Frame) -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <!-- PROTOCOLO DE CONEXÃO: ESTILO (Respeitando Maiúsculas) -->
    <link rel="stylesheet" href="css.css">
</head>
<body>
    <!-- Overlay de Scanlines CRT para Interface JARVIS -->
    <div class="crt-overlay"></div>

    <a-scene fog="type: exponential; color: #000; density: 0.12">
        
        <!-- AMBIENTE: Protocolo Black Void (Custo Metabólico Zero) -->
        <a-sky color="#000000"></a-sky>
        <a-plane id="grid-floor" rotation="-90 0 0" width="200" height="200" 
                 material="color: #00D4FF; wireframe: true; opacity: 0.05"></a-plane>

        <!-- NÚCLEO: Sinal de Clock (Reator de Foco) -->
        <a-entity id="reactor-core" position="0 1.5 -2.5">
            <a-torus id="orbital-ring" radius="0.25" radius-tubular="0.01" color="#00D4FF" opacity="0.3"
                     animation="property: rotation; to: 0 360 360; dur: 8000; loop: true; easing: linear"></a-torus>
            <a-ring id="clock-pulse" color="#00D4FF" radius-inner="0.18" radius-outer="0.2"
                    animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 1000; loop: true"></a-ring>
        </a-entity>

        <!-- MATRIZ 180°: Topologia Soberana de Monitores -->
        
        <!-- Monitor -2: Fluxo de Dados Brutos (Extrema Esquerda) -->
        <a-plane id="mon-minus-2" class="ghost-window" position="-4 1.6 -1.8" rotation="0 50 0" width="2.2" height="1.6" 
                 material="color: #00151f; opacity: 0.2; transparent: true">
            <a-text value="[RAW_DATA_FLOW]\nRESEARCH_MODE" align="center" scale="0.5 0.5 0.5"></a-text>
        </a-plane>

        <!-- Monitor -1: Log de Diagnóstico (Esquerda) -->
        <a-plane id="mon-minus-1" class="ghost-window" position="-2 1.6 -2.8" rotation="0 25 0" width="2.2" height="1.6" 
                 material="color: #00151f; opacity: 0.2; transparent: true">
            <a-text id="log-display" value="[LOGS_ACTIVE]\nMIELINA: 150m/s\nERROR: 0.0" align="center" color="#00D4FF"></a-text>
        </a-plane>

        <!-- Monitor 0: TERMINAL CENTRAL (Execução Pura) -->
        <a-plane id="mon-0" position="0 1.7 -3.2" width="3.8" height="2.4" 
                 material="color: #00151f; opacity: 0.7; transparent: true; emissive: #00D4FF; emissiveIntensity: 0.1">
            <a-text id="execution-text" value="INICIALIZANDO MISSÃO ATC..." align="center" position="0 0.5 0.05" scale="0.8 0.8 0.8"></a-text>
            <!-- Área de Input simulada que será controlada pelo js.js -->
        </a-plane>

        <!-- Monitor +1: Biblioteca de Root / Nexus (Direita) -->
        <a-plane id="mon-plus-1" class="ghost-window" position="2 1.6 -2.8" rotation="0 -25 0" width="2.2" height="1.6" 
                 material="color: #00151f; opacity: 0.2; transparent: true">
            <a-text value="[NEXUS_CONTROL]\n1. ALPHA (TECH)\n2. BETA (RE)\n3. GAMMA (AUTH)" align="center" scale="0.5 0.5 0.5"></a-text>
        </a-plane>

        <!-- Monitor +2: Terminal de Tempo (Extrema Direita) -->
        <a-plane id="mon-plus-2" class="ghost-window" position="4 1.6 -1.8" rotation="0 -50 0" width="2.2" height="1.6" 
                 material="color: #00151f; opacity: 0.2; transparent: true">
            <a-text id="atc-timer" value="ATC_CLOCK: 0.0s\nLATENCY: STABLE" align="center" color="#00D4FF"></a-text>
        </a-plane>

        <!-- HUD INFERIOR: Bio-Monitor (Status do Hardware Humano) -->
        <a-entity id="bio-monitor" position="0 0.4 -1.5" rotation="-25 0 0">
            <a-plane width="1.2" height="0.08" color="#00D4FF" opacity="0.6"></a-plane>
            <a-text value="CPF BATTERY: 100% | MIELINIZACAO ATIVA" scale="0.3 0.3 0.3" align="center" position="0 0.12 0"></a-text>
        </a-entity>

        <!-- CURSOR: Mira Tática e Raycaster para Ghost Windows -->
        <a-entity camera look-controls position="0 1.6 0">
            <a-cursor color="#00D4FF" fuse="true" fuse-timeout="1200" raycaster="objects: .ghost-window, #mon-0"></a-cursor>
        </a-entity>
    </a-scene>

    <!-- PROTOCOLO DE CONEXÃO: LÓGICA (Respeitando Letras Minúsculas) -->
    <script src="js.js" defer></script>
</body>
</html>
