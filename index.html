<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>OMC VR-OS | SENTINEL v4.0 KERNEL</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cyan: #00D4FF;
            --alert: #FF4B00;
            --deep-void: #00050a;
            --glass: rgba(0, 20, 30, 0.85);
        }

        body { margin: 0; background: #000; font-family: 'Share Tech Mono', monospace; overflow: hidden; }

        /* HUD OVERLAY 2D - O Centro de Comando */
        #hud {
            position: fixed; inset: 0; pointer-events: none; z-index: 100;
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px;
        }

        .panel {
            pointer-events: auto; background: var(--glass); 
            border-left: 4px solid var(--cyan); border-right: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.1); padding: 15px; color: var(--cyan);
            backdrop-filter: blur(10px);
        }

        /* Área de Trabalho - Onde a Mágica Acontece */
        #work-area {
            width: 100%; height: 300px; background: transparent; border: none;
            color: var(--cyan); font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem; outline: none; resize: none; margin-top: 10px;
        }

        .status-bar { display: flex; justify-content: space-between; font-size: 0.8rem; border-bottom: 1px solid var(--cyan); padding-bottom: 5px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button {
            background: transparent; border: 1px solid var(--cyan); color: var(--cyan);
            padding: 8px 15px; cursor: pointer; font-family: 'Orbitron', sans-serif;
            text-transform: uppercase; transition: 0.3s;
        }
        button:hover { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }
        
        .alert-active { color: var(--alert) !important; border-color: var(--alert) !important; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="hud">
        <div class="panel" style="width: 400px;">
            <div class="status-bar">
                <span>OPERADOR: MAXWELL LIMA</span>
                <span id="session-timer">00:00:00</span>
            </div>
            <div style="margin-top: 10px;">
                <label>LATÊNCIA COGNITIVA:</label>
                <div style="width: 100%; background: #001a24; height: 10px; margin-top: 5px;">
                    <div id="latency-bar" style="width: 0%; background: var(--cyan); height: 100%; transition: 0.5s;"></div>
                </div>
            </div>
        </div>

        <div class="panel" style="align-self: center; width: 800px; max-width: 90vw;">
            <div class="status-bar">
                <span id="current-mode">MODO: OCIOSO (IDLE)</span>
                <span>PERSISTÊNCIA: ATIVA</span>
            </div>
            <textarea id="work-area" placeholder="[INICIE O PROTOCOLO DE ESCRITA...]"></textarea>
            <div class="btn-group">
                <button onclick="setContext('TECH_LAB')">OMC Tech Lab</button>
                <button onclick="setContext('REAL_ESTATE')">Imóvel in Vista</button>
                <button onclick="setContext('BOOK')">Eng. da Maestria</button>
                <button onclick="clearState()" style="border-color: var(--alert); color: var(--alert);">Flush Cache</button>
            </div>
        </div>

        <div class="panel" style="width: 100%; display: flex; justify-content: space-around; align-items: center;">
            <div>SINAL DE CLOCK: <span id="clock-status">ESTÁVEL</span></div>
            <div>DUMP STATUS: <span id="save-status">AGUARDANDO...</span></div>
            <div style="font-size: 1.5rem; font-weight: bold;" id="live-clock">00:00</div>
        </div>
    </div>

    <a-scene embedded style="height: 100vh; width: 100vw;">
        <a-sky color="#000"></a-sky>
        <a-entity position="0 0 -5">
            <a-grid position="0 -2 0" rotation="-90 0 0" width="100" height="100" static-body material="color: #00D4FF; opacity: 0.1;"></a-grid>
            
            <a-ring color="#00D4FF" radius-inner="2.9" radius-outer="3" position="0 1.6 0" rotation="0 0 0"
                    animation="property: rotation; to: 0 0 360; loop: true; dur: 20000; easing: linear">
            </a-ring>
        </a-entity>

        <a-camera wasd-controls-enabled="false" look-controls-enabled="true">
            <a-cursor color="#00D4FF" opacity="0.5"></a-cursor>
        </a-camera>
    </a-scene>

    <script>
        const KERNEL = {
            state: {
                currentContext: 'IDLE',
                lastInput: Date.now(),
                latencyLimit: 60, // 60 segundos para alerta
            },
            elements: {
                workArea: document.getElementById('work-area'),
                latencyBar: document.getElementById('latency-bar'),
                saveStatus: document.getElementById('save-status'),
                modeDisplay: document.getElementById('current-mode')
            }
        };

        // 1. PROTOCOLO DE PERSISTÊNCIA (LocalStorage)
        KERNEL.elements.workArea.addEventListener('input', () => {
            KERNEL.state.lastInput = Date.now();
            localStorage.setItem(`OMC_DUMP_${KERNEL.state.currentContext}`, KERNEL.elements.workArea.value);
            KERNEL.elements.saveStatus.innerText = "DUMP REALIZADO";
            setTimeout(() => KERNEL.elements.saveStatus.innerText = "SINCRO_OK", 1000);
        });

        function setContext(mode) {
            KERNEL.state.currentContext = mode;
            KERNEL.elements.modeDisplay.innerText = `MODO: ${mode.replace('_', ' ')}`;
            KERNEL.elements.workArea.value = localStorage.getItem(`OMC_DUMP_${mode}`) || "";
            KERNEL.elements.workArea.focus();
        }

        function clearState() {
            if(confirm("Deseja apagar o cache deste contexto?")) {
                localStorage.removeItem(`OMC_DUMP_${KERNEL.state.currentContext}`);
                KERNEL.elements.workArea.value = "";
            }
        }

        // 2. MONITOR DE LATÊNCIA E BIO-FEEDBACK
        setInterval(() => {
            const idleTime = (Date.now() - KERNEL.state.lastInput) / 1000;
            const percentage = Math.min((idleTime / KERNEL.state.latencyLimit) * 100, 100);
            
            KERNEL.elements.latencyBar.style.width = percentage + "%";

            if (idleTime > KERNEL.state.latencyLimit) {
                KERNEL.elements.latencyBar.style.background = "#FF4B00";
                document.getElementById('clock-status').innerText = "GLITCH DETECTADO";
                document.getElementById('clock-status').classList.add('alert-active');
            } else {
                KERNEL.elements.latencyBar.style.background = "#00D4FF";
                document.getElementById('clock-status').innerText = "ESTÁVEL";
                document.getElementById('clock-status').classList.remove('alert-active');
            }
        }, 1000);

        // 3. RELÓGIOS DE SESSÃO
        let seconds = 0;
        setInterval(() => {
            seconds++;
            const h = String(Math.floor(seconds/3600)).padStart(2, '0');
            const m = String(Math.floor((seconds%3600)/60)).padStart(2, '0');
            const s = String(seconds%60).padStart(2, '0');
            document.getElementById('session-timer').innerText = `${h}:${m}:${s}`;
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>
