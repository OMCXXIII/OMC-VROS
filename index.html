<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>OMC VR-OS | SENTINEL v4.0 KERNEL</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00D4FF;
            --alert: #FF4B00;
            --gold: #FFB800;
            --bg-glass: rgba(0, 21, 31, 0.8);
        }
        body { margin: 0; background: #000; font-family: 'Share Tech Mono', monospace; overflow: hidden; }
        
        /* Overlay CRT e Scanlines */
        .crt-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 100;
            background: repeating-linear-gradient(rgba(0,212,255,0.02) 0px, rgba(0,212,255,0.02) 1px, transparent 1px, transparent 3px);
        }

        /* HUD 2D de Emergência */
        #hud-alerts {
            position: fixed; top: 20px; left: 20px; z-index: 101;
            color: var(--cyan); text-transform: uppercase; letter-spacing: 2px;
        }

        .glitch-active { animation: jitter 0.15s infinite; color: var(--alert) !important; }
        @keyframes jitter {
            0% { transform: translate(0); }
            25% { transform: translate(-1px, 1px); }
            75% { transform: translate(1px, -1px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>
    <div id="hud-alerts">
        <div>Status: <span id="sys-status">Estável</span></div>
        <div>Latência: <span id="lat-val">0.0s</span></div>
    </div>

    <a-scene shadow="type: pcfsoft" renderer="antialias: true; colorManagement: true;">
        <a-sky color="#000205"></a-sky>
        <a-grid position="0 0 0" rotation="-90 0 0" width="100" height="100" static-body material="color: #00D4FF; opacity: 0.05; src: url(https://cdn.aframe.io/a-grid/images/grid.png); repeat: 50 50"></a-grid>

        <a-entity camera look-controls wasd-controls position="0 1.6 0">
            <a-cursor color="#00D4FF" fuse="false" scale="0.5 0.5 0.5"></a-cursor>
            
            <a-entity position="0.8 -0.5 -1" scale="0.2 0.2 0.2">
                <a-text value="BIO-FEEDBACK" color="#00D4FF" align="center"></a-text>
                <a-plane id="bar-cpf" width="2" height="0.1" position="0 -0.2 0" color="#00D4FF" opacity="0.8"></a-plane>
                <a-plane id="bar-mielina" width="2" height="0.1" position="0 -0.4 0" color="#FFB800" opacity="0.8"></a-plane>
            </a-entity>
        </a-entity>

        <a-entity position="0 1.6 -2">
            <a-ring color="#00D4FF" radius-inner="1.45" radius-outer="1.5" opacity="0.2" rotation="0 0 0">
                <a-animation attribute="rotation" to="0 0 360" dur="20000" repeat="indefinite" easing="linear"></a-animation>
            </a-ring>

            <a-plane id="main-display" width="2.5" height="1.5" material="color: #00151f; opacity: 0.6; transparent: true; shader: flat">
                <a-text id="vr-text-output" value="AGUARDANDO INPUT DO OPERADOR..." 
                        position="-1.1 0.6 0.01" width="2.2" color="#00D4FF" wrap-count="30" font="monospace"></a-text>
                
                <a-text id="mission-tag" value="MISSAO: ROOT_INIT" position="-1.1 -0.6 0.01" width="1.5" color="#FFB800"></a-text>
                <a-text id="clock-signal" value="CLOCK: 00:00:00" position="0.3 -0.6 0.01" width="1.5" color="#00D4FF"></a-text>
            </a-plane>
        </a-entity>

        <a-light type="ambient" color="#002b36" intensity="0.5"></a-light>
        <a-light type="point" intensity="1" distance="10" position="2 4 2" color="#00D4FF"></a-light>
    </a-scene>

    <script>
        const KERNEL = {
            startTime: Date.now(),
            lastActivity: Date.now(),
            latencyLimit: 60, // Segundos
            stateKey: 'omc_vros_persistent_state',
            profile: 'DEFAULT'
        };

        // LÓGICA DE PERSISTÊNCIA E INPUT
        document.addEventListener('keydown', (e) => {
            KERNEL.lastActivity = Date.now();
            const display = document.getElementById('vr-text-output');
            
            if (e.key.length === 1) {
                let current = display.getAttribute('value');
                if (current.includes("AGUARDANDO")) current = "";
                const newContent = (current + e.key).toUpperCase();
                display.setAttribute('value', newContent);
                localStorage.setItem(KERNEL.stateKey, newContent);
            } else if (e.key === 'Backspace') {
                let current = display.getAttribute('value');
                display.setAttribute('value', current.slice(0, -1));
            }
        });

        // MONITOR DE LATÊNCIA E BOREDOM-CHECK
        function updateSystem() {
            const now = Date.now();
            const latency = (now - KERNEL.lastActivity) / 1000;
            
            // Atualiza HUD 2D
            document.getElementById('lat-val').innerText = latency.toFixed(1) + 's';
            
            const statusEl = document.getElementById('sys-status');
            const displayPlane = document.getElementById('main-display');

            if (latency > KERNEL.latencyLimit) {
                statusEl.innerText = "ALERTA: LATÊNCIA ALTA";
                statusEl.classList.add('glitch-active');
                displayPlane.setAttribute('material', 'color: #FF4B00; opacity: 0.8');
            } else {
                statusEl.innerText = "SISTEMA ESTÁVEL";
                statusEl.classList.remove('glitch-active');
                displayPlane.setAttribute('material', 'color: #00151f; opacity: 0.6');
            }

            // Relógio de Sessão
            const sessionSecs = Math.floor((now - KERNEL.startTime) / 1000);
            const h = Math.floor(sessionSecs / 3600).toString().padStart(2, '0');
            const m = Math.floor((sessionSecs % 3600) / 60).toString().padStart(2, '0');
            const s = (sessionSecs % 60).toString().padStart(2, '0');
            document.getElementById('clock-signal').setAttribute('value', `CLOCK: ${h}:${m}:${s}`);

            // Simulação de Consumo de CPF (Bateria Mental)
            const cpfBar = document.getElementById('bar-cpf');
            const currentWidth = Math.max(0.1, 2 - (sessionSecs / 1800) * 2); // Esvazia em 30 min
            cpfBar.setAttribute('width', currentWidth);
        }

        // CARREGAR ESTADO ANTERIOR
        window.onload = () => {
            const saved = localStorage.getItem(KERNEL.stateKey);
            if (saved) {
                document.getElementById('vr-text-output').setAttribute('value', saved);
            }
            setInterval(updateSystem, 1000);
        };
    </script>
</body>
</html>
